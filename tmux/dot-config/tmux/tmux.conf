set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g display-time 5000
set -s escape-time 0
set -g focus-events on
set -g history-limit 50000
set -g status-interval 5
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on

# Status bar
set -g status-position top
set -g status-style "bg=default,fg=#7f8490"
set -g status-left "#[fg=#76cce0,bg=#181819,bold] #S #[bg=default] "
set -g status-left-length 20
set -g status-right "#[fg=#7f8490] %b %d %H:%M "
set -g status-right-length 30

# Window tabs
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#9ed072,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#414550"
set -g pane-active-border-style "fg=#76cce0"
set -g pane-border-indicators colour
set -g pane-border-lines single

# Popup borders
set -g popup-border-style "fg=#414550"
set -g popup-border-lines rounded

# Messages
set -g message-style "bg=#414550,fg=#e2e2e3"
set -g message-command-style "bg=#414550,fg=#e2e2e3"

# Splits open in current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Popups
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" -T "#[fg=#e2e2e3] lazygit " lazygit
