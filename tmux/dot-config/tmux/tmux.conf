set -g default-terminal "tmux-256color"
set -g allow-passthrough
set -as terminal-features ",xterm-256color:RGB"
set -g display-time 5000
set -s escape-time 0
set -g focus-events on
set -g history-limit 50000
set -g status-interval 5
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -s set-clipboard on

# Status bar
set -g status-position top
set -g status 2
set -g status-format[1] "#[fg=#4C566A,bg=default,fill=default]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"
set -g status-style "bg=default,fg=#4C566A"
set -g status-left "#[fg=#88C0D0,bg=#2E3440,bold] #S #[bg=default] "
set -g status-left-length 20
set -g status-right "#[fg=#4C566A] %b %d %H:%M "
set -g status-right-length 30

# Window tabs
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#A3BE8C,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3B4252"
set -g pane-active-border-style "fg=#88C0D0"
set -g pane-border-indicators colour
set -g pane-border-lines single

# Popup borders
set -g popup-border-style "fg=#3B4252"
set -g popup-border-lines rounded

# Messages
set -g message-style "bg=#3B4252,fg=#D8DEE9"
set -g message-command-style "bg=#3B4252,fg=#D8DEE9"

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits open in current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Popups
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" -T "#[fg=#D8DEE9]  lazygit " lazygit
